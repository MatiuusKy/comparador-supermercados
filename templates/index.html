<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparador de Supermercados</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a6b3a;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.3rem; font-weight: 600; }

    .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

    /* Search bar */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      flex: 1;
      padding: 0.65rem 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
    }

    .search-bar input:focus { border-color: #1a6b3a; }

    .search-bar button {
      padding: 0.65rem 1.5rem;
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    .search-bar button:hover { background: #155530; }
    .search-bar button:disabled { background: #999; cursor: not-allowed; }

    /* Status bar */
    #status {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }

    #status.error { color: #c0392b; }

    /* Layout: tabla + carrito lado a lado */
    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* Results table */
    .table-wrapper {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow-x: auto;
    }

    #filter-input {
      width: 100%;
      padding: 0.5rem 1rem;
      border: none;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
      outline: none;
      border-radius: 8px 8px 0 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #f9f9f9;
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #eee;
      white-space: nowrap;
    }

    tbody tr:hover { background: #fafafa; }

    tbody td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    td.price { text-align: right; white-space: nowrap; }
    td.price.best { color: #1a6b3a; font-weight: 700; }
    td.price.empty { color: #bbb; }

    .product-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 4px;
    }

    .add-btn {
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .add-btn:hover { background: #155530; }

    /* Cart panel */
    .cart-panel {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 1rem;
      position: sticky;
      top: 1rem;
    }

    .cart-panel h2 { font-size: 1rem; margin-bottom: 0.75rem; }

    .cart-empty { color: #999; font-size: 0.9rem; text-align: center; padding: 1rem 0; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
      gap: 0.5rem;
    }

    .cart-item-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .qty-btn {
      background: #eee;
      border: none;
      border-radius: 3px;
      padding: 0 0.4rem;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .qty-btn:hover { background: #ddd; }

    .cart-totals { margin-top: 0.75rem; }

    .cart-store-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .cart-store-row.cheapest { color: #1a6b3a; font-weight: 700; }

    .savings-badge {
      background: #e8f5e9;
      color: #1a6b3a;
      font-size: 0.75rem;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
    }

    .buy-btn {
      display: block;
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.35rem;
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .buy-btn:hover { background: #155530; }
    .buy-btn:disabled { background: #ccc; cursor: not-allowed; }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.4rem;
      background: #fff;
      color: #c0392b;
      border: 1px solid #c0392b;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .clear-btn:hover { background: #ffeaea; }

    /* Sort bar */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      background: white;
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
    }
    .sort-label { font-size: 0.8rem; color: #888; margin-right: 0.25rem; }
    .sort-btn {
      padding: 0.2rem 0.6rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      color: #444;
    }
    .sort-btn:hover { background: #f5f5f5; }
    .sort-btn.active { background: #1a6b3a; color: white; border-color: #1a6b3a; }

    /* Secciones por supermercado en carrito */
    .store-section {
      margin-top: 0.6rem;
      border: 1px solid #eee;
      border-radius: 6px;
      overflow: hidden;
    }
    .store-section.cheapest { border-color: #1a6b3a; }
    .store-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.6rem;
      background: #f9f9f9;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .store-section.cheapest .store-section-header { background: #e8f5e9; color: #1a6b3a; }
    .store-section-avail { font-size: 0.73rem; font-weight: 400; color: #888; margin-left: 0.3rem; }
    .store-section.cheapest .store-section-avail { color: #2e7d50; }
    .store-items { padding: 0.25rem 0.6rem; }
    .store-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #555;
      padding: 0.18rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .store-item-row:last-child { border-bottom: none; }
    .store-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .store-item-price { white-space: nowrap; margin-left: 0.5rem; font-variant-numeric: tabular-nums; }
    .store-item-unavail { font-size: 0.78rem; color: #bbb; padding: 0.18rem 0; }

    /* Botón Comprar */
    .comprar-btn {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.55rem;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .comprar-btn:hover { background: #27ae60; }

    /* Modal resumen */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-box {
      background: white;
      border-radius: 10px;
      max-width: 560px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
    }
    .modal-header h3 { font-size: 1.05rem; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
      line-height: 1;
    }
    .modal-close:hover { color: #333; }
    .modal-body { padding: 0.75rem 1.25rem 1.25rem; }
    .modal-store-section {
      margin-bottom: 1rem;
      border: 1px solid #eee;
      border-radius: 6px;
      overflow: hidden;
    }
    .modal-store-section.cheapest { border-color: #1a6b3a; }
    .modal-store-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.75rem;
      background: #f9f9f9;
      font-weight: 600;
      font-size: 0.9rem;
      gap: 0.5rem;
    }
    .modal-store-section.cheapest .modal-store-header { background: #e8f5e9; color: #1a6b3a; }
    .modal-store-items { padding: 0.25rem 0.75rem; }
    .modal-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #555;
      padding: 0.22rem 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .modal-item-row:last-child { border-bottom: none; }
    .modal-item-name { flex: 1; }
    .modal-item-price { white-space: nowrap; margin-left: 0.5rem; font-variant-numeric: tabular-nums; }
    .modal-unavail { font-size: 0.8rem; color: #bbb; padding: 0.3rem 0; }
    .modal-buy-btn {
      display: block;
      width: calc(100% - 1.5rem);
      margin: 0.4rem 0.75rem 0.5rem;
      padding: 0.4rem;
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .modal-buy-btn:hover { background: #155530; }
    .modal-buy-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.5rem">🛒</span>
  <h1>Comparador de Supermercados</h1>
</header>

<div class="main">

  <!-- Buscador -->
  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Ej: arroz, leche, detergente…" autocomplete="off" list="categories-list">
    <datalist id="categories-list"></datalist>
    <button id="search-btn" onclick="startSearch()">Buscar</button>
  </div>

  <div id="status"></div>

  <div class="layout">

    <!-- Tabla comparativa -->
    <div>
    <div id="sort-bar" class="sort-bar" style="display:none">
      <span class="sort-label">Ordenar:</span>
      <button class="sort-btn active" data-sort="default" onclick="sortTable('default')">Relevancia</button>
      <button class="sort-btn" data-sort="price_asc" onclick="sortTable('price_asc')">Precio ↑</button>
      <button class="sort-btn" data-sort="price_desc" onclick="sortTable('price_desc')">Precio ↓</button>
      <button class="sort-btn" data-sort="name_asc" onclick="sortTable('name_asc')">Nombre A-Z</button>
    </div>
    <div class="table-wrapper">
      <input id="filter-input" type="text" placeholder="Filtrar resultados…" oninput="filterTable()" style="display:none">
      <table id="results-table">
        <thead id="table-head">
          <tr>
            <th></th>
            <th>Producto</th>
            <th>Marca</th>
            <th>Unidad</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    </div>

    <!-- Carrito -->
    <div class="cart-panel">
      <h2>🛒 Carrito</h2>
      <div id="cart-items"></div>
      <div id="cart-totals" class="cart-totals"></div>
      <button class="comprar-btn" onclick="openSummaryModal()" id="comprar-btn" style="display:none">Comprar</button>
      <button class="clear-btn" onclick="clearCart()" id="clear-btn" style="display:none">Vaciar carrito</button>
    </div>

  </div>
</div>

<!-- Modal resumen -->
<div id="summary-modal" class="modal-overlay" style="display:none" onclick="closeSummaryModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Resumen del carrito</h3>
      <button class="modal-close" onclick="closeSummaryModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ─── Estado global ──────────────────────────────────────────────────────────
const state = {
  stores: new Map(),       // store_id(int) → {store_name, store_url, store_logo}
  products: new Map(),     // product_id → {product_id, slug, brand, unit, storeMap: Map}
  eventSource: null,
  defaultOrder: [],        // product_ids en orden original de la API
};

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ─── Carrito (localStorage) ──────────────────────────────────────────────────
function loadCart() {
  try {
    return JSON.parse(localStorage.getItem('supermarket_cart') || '[]');
  } catch { return []; }
}

function saveCart(cart) {
  localStorage.setItem('supermarket_cart', JSON.stringify(cart));
}

// ─── Inicialización ──────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/categories');
    const cats = await res.json();
    const dl = document.getElementById('categories-list');
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.slug;
      opt.label = c.name + (c.parent ? ` (${c.parent})` : '');
      dl.appendChild(opt);
    });
  } catch (e) {
    console.warn('No se pudieron cargar categorías:', e);
  }
  renderCart();
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startSearch();
  });
}

window.addEventListener('DOMContentLoaded', init);

// ─── Búsqueda + SSE ──────────────────────────────────────────────────────────
function startSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  if (state.eventSource) state.eventSource.close();
  state.stores.clear();
  state.products.clear();
  state.defaultOrder = [];
  document.getElementById('table-body').innerHTML = '';
  document.getElementById('table-head').innerHTML = `
    <tr>
      <th></th>
      <th>Producto</th>
      <th>Marca</th>
      <th>Unidad</th>
      <th></th>
    </tr>`;
  document.getElementById('filter-input').style.display = 'none';
  const sortBar = document.getElementById('sort-bar');
  sortBar.style.display = 'none';
  sortBar.querySelectorAll('.sort-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sort === 'default');
  });
  setStatus(`Buscando "${q}"…`);

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Buscando…';

  const es = new EventSource(`/api/search/stream?q=${encodeURIComponent(q)}`);
  state.eventSource = es;

  es.addEventListener('products', e => {
    const batch = JSON.parse(e.data);
    batch.forEach(product => {
      // Omitir productos sin stock en ningún supermercado
      if (!product.stores.some(s => s.available > 0)) return;
      state.defaultOrder.push(product.product_id);
      product.stores.forEach(s => {
        if (!state.stores.has(s.store_id)) {
          state.stores.set(s.store_id, {
            store_name: s.store_name,
            store_url: s.store_url,
            store_logo: s.store_logo,
          });
          addStoreColumn(s.store_id, s.store_name);
        }
      });

      const storeMap = new Map(product.stores.map(s => [s.store_id, s]));
      state.products.set(product.product_id, { ...product, storeMap });
      appendProductRow(product, storeMap);
    });
    setStatus(`${state.products.size} productos encontrados…`);
    refreshPriceHighlights();
  });

  es.addEventListener('done', () => {
    es.close();
    setStatus(`${state.products.size} productos encontrados.`);
    btn.disabled = false;
    btn.textContent = 'Buscar';
    if (state.products.size > 0) {
      document.getElementById('filter-input').style.display = 'block';
      document.getElementById('sort-bar').style.display = 'flex';
      refreshPriceHighlights();
    }
  });

  es.addEventListener('error', e => {
    if (e.data) {
      const msg = JSON.parse(e.data).message;
      setStatus(`Error: ${msg}`, true);
    } else {
      setStatus('Error de conexión.', true);
    }
    es.close();
    btn.disabled = false;
    btn.textContent = 'Buscar';
  });
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

// ─── Tabla ───────────────────────────────────────────────────────────────────
function addStoreColumn(storeId, storeName) {
  const thead = document.getElementById('table-head');
  const row = thead.querySelector('tr');

  const th = document.createElement('th');
  th.dataset.storeId = storeId;
  th.textContent = storeName;
  row.insertBefore(th, row.lastElementChild);

  document.querySelectorAll('#table-body tr').forEach(tr => {
    const td = document.createElement('td');
    td.className = 'price empty';
    td.dataset.storeId = storeId;
    td.textContent = '—';
    tr.insertBefore(td, tr.lastElementChild);
  });
}

function appendProductRow(product, storeMap) {
  const tbody = document.getElementById('table-body');
  const tr = document.createElement('tr');
  tr.dataset.productId = product.product_id;

  const firstStore = product.stores[0];
  const imgSrc = firstStore?.image || '';
  const tdImg = document.createElement('td');
  if (imgSrc) {
    const img = document.createElement('img');
    img.className = 'product-img';
    img.src = imgSrc;
    img.alt = '';
    img.loading = 'lazy';
    img.referrerPolicy = 'no-referrer';
    img.onerror = () => { img.style.display = 'none'; };
    tdImg.appendChild(img);
  }
  tr.appendChild(tdImg);

  const tdName = document.createElement('td');
  tdName.textContent = firstStore?.product_name || product.slug;
  tr.appendChild(tdName);

  const tdBrand = document.createElement('td');
  tdBrand.textContent = product.brand;
  tr.appendChild(tdBrand);

  const tdUnit = document.createElement('td');
  tdUnit.textContent = product.unit;
  tr.appendChild(tdUnit);

  state.stores.forEach((_, storeId) => {
    const td = document.createElement('td');
    td.className = 'price';
    td.dataset.storeId = storeId;
    const s = storeMap.get(storeId);
    if (s && s.available > 0) {
      const displayPrice = s.best_promo_price ?? s.price;
      td.textContent = formatPrice(displayPrice);
      td.dataset.price = displayPrice;
    } else {
      td.textContent = '—';
      td.classList.add('empty');
    }
    tr.appendChild(td);
  });

  const tdAdd = document.createElement('td');
  tdAdd.innerHTML = `<button class="add-btn" onclick="addToCart(${product.product_id})" title="Agregar al carrito">+</button>`;
  tr.appendChild(tdAdd);

  tbody.appendChild(tr);
}

function refreshPriceHighlights() {
  document.querySelectorAll('#table-body tr').forEach(tr => {
    const cells = [...tr.querySelectorAll('td.price:not(.empty)')];
    if (cells.length === 0) return;
    const prices = cells.map(td => parseFloat(td.dataset.price)).filter(p => !isNaN(p));
    if (prices.length === 0) return;
    const minPrice = Math.min(...prices);
    cells.forEach(td => {
      td.classList.toggle('best', parseFloat(td.dataset.price) === minPrice);
    });
  });
}

function filterTable() {
  const q = document.getElementById('filter-input').value.toLowerCase();
  document.querySelectorAll('#table-body tr').forEach(tr => {
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(q) ? '' : 'none';
  });
}

function formatPrice(n) {
  return '$' + Math.round(n).toLocaleString('es-CL');
}

// ─── Ordenamiento ────────────────────────────────────────────────────────────
function getMinPrice(tr) {
  const cells = [...tr.querySelectorAll('td.price:not(.empty)')];
  const prices = cells.map(td => parseFloat(td.dataset.price)).filter(p => !isNaN(p));
  return prices.length ? Math.min(...prices) : Infinity;
}

function sortTable(criterion) {
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.sort === criterion);
  });
  const tbody = document.getElementById('table-body');
  const rows = [...tbody.querySelectorAll('tr')];
  if (criterion === 'default') {
    state.defaultOrder.forEach(id => {
      const row = tbody.querySelector(`tr[data-product-id="${id}"]`);
      if (row) tbody.appendChild(row);
    });
    return;
  }
  rows.sort((a, b) => {
    if (criterion === 'price_asc' || criterion === 'price_desc') {
      const diff = getMinPrice(a) - getMinPrice(b);
      return criterion === 'price_asc' ? diff : -diff;
    }
    if (criterion === 'name_asc') {
      const nameA = a.querySelectorAll('td')[1]?.textContent || '';
      const nameB = b.querySelectorAll('td')[1]?.textContent || '';
      return nameA.localeCompare(nameB, 'es');
    }
    return 0;
  });
  rows.forEach(row => tbody.appendChild(row));
}

// ─── Carrito ─────────────────────────────────────────────────────────────────
function addToCart(productId) {
  const product = state.products.get(productId);
  if (!product) return;

  const cart = loadCart();
  const existing = cart.find(item => item.product_id === productId);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({
      product_id: product.product_id,
      slug: product.slug,
      brand: product.brand,
      unit: product.unit,
      name: product.stores[0]?.product_name || product.slug,
      qty: 1,
      stores: product.stores.map(s => ({
        store_id: s.store_id,
        store_name: s.store_name,
        store_url: s.store_url,
        price: s.best_promo_price ?? s.price,
        url: s.url,
      })),
    });
  }
  saveCart(cart);
  renderCart();
}

function changeQty(productId, delta) {
  const cart = loadCart();
  const item = cart.find(i => i.product_id === productId);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  const newCart = item.qty === 0 ? cart.filter(i => i.product_id !== productId) : cart;
  saveCart(newCart);
  renderCart();
}

function clearCart() {
  saveCart([]);
  renderCart();
}

function renderCart() {
  const cart = loadCart();
  const itemsEl = document.getElementById('cart-items');
  const totalsEl = document.getElementById('cart-totals');
  const clearBtn = document.getElementById('clear-btn');
  const comprarBtn = document.getElementById('comprar-btn');

  if (cart.length === 0) {
    itemsEl.innerHTML = '<div class="cart-empty">El carrito está vacío</div>';
    totalsEl.innerHTML = '';
    clearBtn.style.display = 'none';
    comprarBtn.style.display = 'none';
    return;
  }

  clearBtn.style.display = 'block';
  comprarBtn.style.display = 'block';

  // Lista unificada con controles de cantidad
  itemsEl.innerHTML = '';
  cart.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'cart-item-name';
    nameSpan.title = item.name;
    nameSpan.textContent = item.name;

    const qtyDiv = document.createElement('div');
    qtyDiv.className = 'cart-item-qty';

    const minusBtn = document.createElement('button');
    minusBtn.className = 'qty-btn';
    minusBtn.textContent = '−';
    minusBtn.onclick = () => changeQty(item.product_id, -1);

    const qtySpan = document.createElement('span');
    qtySpan.textContent = item.qty;

    const plusBtn = document.createElement('button');
    plusBtn.className = 'qty-btn';
    plusBtn.textContent = '+';
    plusBtn.onclick = () => changeQty(item.product_id, 1);

    qtyDiv.appendChild(minusBtn);
    qtyDiv.appendChild(qtySpan);
    qtyDiv.appendChild(plusBtn);
    div.appendChild(nameSpan);
    div.appendChild(qtyDiv);
    itemsEl.appendChild(div);
  });

  // Agrupar por supermercado con ítems detallados
  const storeTotals = new Map();
  cart.forEach(item => {
    item.stores.forEach(s => {
      if (!storeTotals.has(s.store_id)) {
        storeTotals.set(s.store_id, {
          store_name: s.store_name,
          store_url: s.store_url,
          total: 0,
          urls: [],
          items: [],
        });
      }
      const entry = storeTotals.get(s.store_id);
      const lineTotal = s.price * item.qty;
      entry.total += lineTotal;
      if (s.url) entry.urls.push(s.url);
      entry.items.push({ name: item.name, qty: item.qty, price: s.price, lineTotal });
    });
  });

  if (storeTotals.size === 0) {
    totalsEl.innerHTML = '';
    return;
  }

  const totalsArr = [...storeTotals.entries()]
    .map(([sid, v]) => ({ store_id: sid, ...v }))
    .sort((a, b) => a.total - b.total);

  const minTotal = totalsArr[0].total;
  const maxTotal = totalsArr[totalsArr.length - 1].total;
  const totalCartItems = cart.length;

  totalsEl.innerHTML = '';
  const hr = document.createElement('hr');
  hr.style.margin = '0.5rem 0';
  totalsEl.appendChild(hr);
  const label = document.createElement('strong');
  label.style.fontSize = '0.82rem';
  label.textContent = 'Por supermercado';
  totalsEl.appendChild(label);

  totalsArr.forEach(t => {
    const isCheapest = t.total === minTotal && minTotal < maxTotal;
    const savings = maxTotal > 0 && !isCheapest
      ? Math.round((1 - t.total / maxTotal) * 100)
      : null;

    const section = document.createElement('div');
    section.className = 'store-section' + (isCheapest ? ' cheapest' : '');

    // Encabezado: nombre + total
    const header = document.createElement('div');
    header.className = 'store-section-header';

    const nameEl = document.createElement('span');
    const availCount = t.items.length;
    nameEl.textContent = t.store_name;
    if (availCount < totalCartItems) {
      const avail = document.createElement('span');
      avail.className = 'store-section-avail';
      avail.textContent = `(${availCount}/${totalCartItems})`;
      nameEl.appendChild(avail);
    }

    const totalEl = document.createElement('span');
    totalEl.textContent = formatPrice(t.total) + ' ';
    if (isCheapest) {
      const badge = document.createElement('span');
      badge.className = 'savings-badge';
      badge.textContent = 'Más barato';
      totalEl.appendChild(badge);
    } else if (savings !== null) {
      const badge = document.createElement('span');
      badge.className = 'savings-badge';
      badge.textContent = `-${savings}%`;
      totalEl.appendChild(badge);
    }

    header.appendChild(nameEl);
    header.appendChild(totalEl);
    section.appendChild(header);

    // Ítems disponibles en este supermercado
    const itemsList = document.createElement('div');
    itemsList.className = 'store-items';
    t.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'store-item-row';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'store-item-name';
      nameSpan.title = item.name;
      nameSpan.textContent = `${item.name} ×${item.qty}`;

      const priceSpan = document.createElement('span');
      priceSpan.className = 'store-item-price';
      priceSpan.textContent = formatPrice(item.lineTotal);

      row.appendChild(nameSpan);
      row.appendChild(priceSpan);
      itemsList.appendChild(row);
    });

    // Productos no disponibles en este supermercado
    const unavailNames = cart
      .filter(ci => !t.items.some(ti => ti.name === ci.name))
      .map(ci => ci.name);
    if (unavailNames.length) {
      const unavail = document.createElement('div');
      unavail.className = 'store-item-unavail';
      unavail.textContent = `Sin stock: ${unavailNames.join(', ')}`;
      itemsList.appendChild(unavail);
    }

    section.appendChild(itemsList);

    // Botón comprar
    const buyBtn = document.createElement('button');
    buyBtn.className = 'buy-btn';
    buyBtn.textContent = `Ir a comprar`;
    buyBtn.disabled = !t.urls.length;
    buyBtn.onclick = () => openStoreCart(t.store_id);
    section.appendChild(buyBtn);

    totalsEl.appendChild(section);
  });
}

function openSummaryModal() {
  const cart = loadCart();
  if (cart.length === 0) return;

  const storeTotals = new Map();
  cart.forEach(item => {
    item.stores.forEach(s => {
      if (!storeTotals.has(s.store_id)) {
        storeTotals.set(s.store_id, { store_name: s.store_name, total: 0, urls: [], items: [] });
      }
      const entry = storeTotals.get(s.store_id);
      const lineTotal = s.price * item.qty;
      entry.total += lineTotal;
      if (s.url) entry.urls.push(s.url);
      entry.items.push({ name: item.name, qty: item.qty, price: s.price, lineTotal });
    });
  });

  const totalsArr = [...storeTotals.entries()]
    .map(([sid, v]) => ({ store_id: sid, ...v }))
    .sort((a, b) => a.total - b.total);

  const minTotal = totalsArr[0]?.total ?? 0;
  const maxTotal = totalsArr[totalsArr.length - 1]?.total ?? 0;
  const totalCartItems = cart.length;

  const modalBody = document.getElementById('modal-body');
  modalBody.innerHTML = '';

  totalsArr.forEach(t => {
    const isCheapest = t.total === minTotal && minTotal < maxTotal;
    const savings = maxTotal > 0 && !isCheapest ? Math.round((1 - t.total / maxTotal) * 100) : null;

    const section = document.createElement('div');
    section.className = 'modal-store-section' + (isCheapest ? ' cheapest' : '');

    const header = document.createElement('div');
    header.className = 'modal-store-header';

    const nameEl = document.createElement('span');
    nameEl.textContent = t.store_name;
    if (t.items.length < totalCartItems) {
      nameEl.textContent += ` (${t.items.length}/${totalCartItems} disponibles)`;
    }

    const totalEl = document.createElement('span');
    totalEl.style.display = 'flex';
    totalEl.style.alignItems = 'center';
    totalEl.style.gap = '0.3rem';
    const totalText = document.createTextNode(formatPrice(t.total));
    totalEl.appendChild(totalText);
    if (isCheapest) {
      const badge = document.createElement('span');
      badge.className = 'savings-badge';
      badge.textContent = 'Más barato';
      totalEl.appendChild(badge);
    } else if (savings !== null) {
      const badge = document.createElement('span');
      badge.className = 'savings-badge';
      badge.textContent = `-${savings}%`;
      totalEl.appendChild(badge);
    }

    header.appendChild(nameEl);
    header.appendChild(totalEl);
    section.appendChild(header);

    const itemsList = document.createElement('div');
    itemsList.className = 'modal-store-items';

    t.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'modal-item-row';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'modal-item-name';
      nameSpan.textContent = `${item.name} × ${item.qty}`;
      const priceSpan = document.createElement('span');
      priceSpan.className = 'modal-item-price';
      priceSpan.textContent = formatPrice(item.lineTotal);
      row.appendChild(nameSpan);
      row.appendChild(priceSpan);
      itemsList.appendChild(row);
    });

    const unavailNames = cart
      .filter(ci => !t.items.some(ti => ti.name === ci.name))
      .map(ci => ci.name);
    if (unavailNames.length) {
      const unavail = document.createElement('div');
      unavail.className = 'modal-unavail';
      unavail.textContent = `Sin stock: ${unavailNames.join(', ')}`;
      itemsList.appendChild(unavail);
    }

    section.appendChild(itemsList);

    const buyBtn = document.createElement('button');
    buyBtn.className = 'modal-buy-btn';
    buyBtn.textContent = `Ir a comprar en ${t.store_name}`;
    buyBtn.disabled = !t.urls.length;
    buyBtn.onclick = () => openStoreCart(t.store_id);
    section.appendChild(buyBtn);

    modalBody.appendChild(section);
  });

  document.getElementById('summary-modal').style.display = 'flex';
}

function closeSummaryModal(e) {
  if (!e || e.target === document.getElementById('summary-modal')) {
    document.getElementById('summary-modal').style.display = 'none';
  }
}

function openStoreCart(storeId) {
  const cart = loadCart();
  const urls = cart.flatMap(item =>
    item.stores.filter(s => s.store_id === storeId && s.url).map(s => s.url)
  );
  urls.forEach(url => window.open(url, '_blank'));
}
</script>
